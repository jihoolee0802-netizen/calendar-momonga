<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Momonga Calendar</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--pink:#FFDDEE;
--purple:#E9D9FF;
--sky:#DFF4FF;
--sky-deep:#BFE8FF;

--text:#444;
--white:#FFFFFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#F7FAFD;
font-family:'Pretendard',sans-serif;
padding:20px 14px 120px;
color:var(--text);
}

.container{
width:100%;
max-width:900px;
margin:auto;
}

.header-card{
background:linear-gradient(
135deg,
#FFDDEE,
#E9D9FF,
#DFF4FF
);

border-radius:32px;
padding:28px 24px;
margin-bottom:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.06);
}

.title{
font-size:34px;
font-weight:700;
line-height:1.1;
color:#555;
letter-spacing:-0.05em;
}

.sub{
margin-top:10px;
font-size:14px;
color:#666;
}

.calendar{
background:white;
border-radius:30px;
padding:24px;
box-shadow:
0 10px 30px rgba(0,0,0,0.05);
}

.month-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.month-title{
font-size:28px;
font-weight:700;
color:#666;
letter-spacing:-0.03em;
}

.month-btn{
border:none;
width:42px;
height:42px;
border-radius:50%;
background:#F3F6FA;
font-size:18px;
cursor:pointer;
color:#777;
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-bottom:14px;
}

.weekday{
text-align:center;
font-size:13px;
font-weight:700;
color:#9AA8B5;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:#FAFCFF;
border-radius:22px;
min-height:120px;
padding:10px;
position:relative;
transition:0.18s ease;
cursor:pointer;
border:1px solid #EEF3F8;
}

.day:hover{
transform:translateY(-2px);
}

.day-number{
font-size:14px;
font-weight:700;
margin-bottom:8px;
color:#666;
}

.events{
display:flex;
flex-direction:column;
gap:6px;
}

.event{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:700;
line-height:1.4;
width:100%;
overflow:hidden;
word-break:break-word;
box-shadow:
0 3px 10px rgba(0,0,0,0.04);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;
max-width:700px;
background:white;
border-radius:30px 30px 0 0;
padding:24px 20px 40px;
max-height:92vh;
overflow:auto;
}

.editor-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#666;
}

.input{
width:100%;
border:none;
outline:none;
background:#F5F7FB;
border-radius:18px;
padding:16px;
margin-bottom:14px;
font-size:15px;
font-family:'Pretendard',sans-serif;
}

.color-grid{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.color-btn{
width:42px;
height:42px;
border-radius:50%;
border:3px solid transparent;
cursor:pointer;
}

.color-btn.active{
border-color:#555;
}

.submit{
width:100%;
height:56px;
border:none;
border-radius:20px;
background:linear-gradient(
135deg,
#FFDDEE,
#DFF4FF
);

font-size:16px;
font-weight:700;
cursor:pointer;
color:#555;
}

.footer{
margin-top:26px;
text-align:center;
font-size:13px;
color:#AAB6C2;
}

@media (max-width:768px){

.day{
min-height:95px;
padding:8px;
}

.month-title{
font-size:24px;
}

.title{
font-size:28px;
}

.event{
font-size:12px;
padding:7px 12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header-card">

<div class="title">
MAY 2026 ✦
</div>

<div class="sub">
momonga schedule archive ☁️
</div>

</div>

<div class="calendar">

<div class="month-row">

<button
class="month-btn"
onclick="changeMonth(-1)"
>
‹
</button>

<div
class="month-title"
id="monthTitle"
>
May 2026
</div>

<button
class="month-btn"
onclick="changeMonth(1)"
>
›
</button>

</div>

<div class="weekdays">

<div class="weekday">SUN</div>
<div class="weekday">MON</div>
<div class="weekday">TUE</div>
<div class="weekday">WED</div>
<div class="weekday">THU</div>
<div class="weekday">FRI</div>
<div class="weekday">SAT</div>

</div>

<div
class="days"
id="days"
></div>

</div>

<div class="footer">
made with momonga ♡
</div>

</div>

<div
class="overlay"
id="overlay"
>

<div class="editor">

<div class="editor-title">
일정 추가 ✦
</div>

<input
class="input"
id="eventText"
placeholder="일정 입력 (10글자 정도 추천)"
maxlength="14"
/>

<input
class="input"
id="archiveInput"
placeholder="저장공간 이름"
/>

<div class="color-grid">

<div class="color-btn active"
style="background:#FFDDEE"
data-color="#FFDDEE"></div>

<div class="color-btn"
style="background:#E9D9FF"
data-color="#E9D9FF"></div>

<div class="color-btn"
style="background:#FFE8C7"
data-color="#FFE8C7"></div>

<div class="color-btn"
style="background:#DFF4FF"
data-color="#DFF4FF"></div>

<div class="color-btn"
style="background:#FFFFFF;border:1px solid #ddd;"
data-color="#FFFFFF"></div>

</div>

<button
class="submit"
onclick="saveEvent()"
>
저장하기
</button>

</div>

</div>

<script>

//////////////////////////////////////////////////
// firebase
//////////////////////////////////////////////////

const firebaseConfig = {

apiKey: "AIzaSyCzB2yaMHzz5Y9HrcGKKgVYGcNwh24pb_Y",

authDomain: "calendar-momonga.firebaseapp.com",

projectId: "calendar-momonga",

storageBucket: "calendar-momonga.firebasestorage.app",

messagingSenderId: "1048927787856",

appId: "1:1048927787856:web:5a75506e8ef885e618aa55"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

//////////////////////////////////////////////////
// archive
//////////////////////////////////////////////////

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

//////////////////////////////////////////////////
// state
//////////////////////////////////////////////////

const overlay =
document.getElementById('overlay');

const daysEl =
document.getElementById('days');

const monthTitle =
document.getElementById('monthTitle');

let currentDate =
new Date();

let selectedDate = null;

let selectedColor =
'#FFDDEE';

let events = [];

//////////////////////////////////////////////////
// color select
//////////////////////////////////////////////////

document
.querySelectorAll('.color-btn')
.forEach(btn=>{

btn.onclick = ()=>{

document
.querySelectorAll('.color-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

selectedColor =
btn.dataset.color;

};

});

//////////////////////////////////////////////////
// firestore realtime
//////////////////////////////////////////////////

db.collection("calendars")
.doc(archiveId)
.collection("events")
.onSnapshot(snapshot=>{

events =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderCalendar();

});

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////

function renderCalendar(){

daysEl.innerHTML = '';

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

const monthNames = [

'January',
'February',
'March',
'April',
'May',
'June',
'July',
'August',
'September',
'October',
'November',
'December'

];

monthTitle.textContent =
`${monthNames[month]} ${year}`;

for(let i=0;i<firstDay;i++){

const empty =
document.createElement('div');

daysEl.appendChild(empty);

}

for(let day=1;day<=lastDate;day++){

const dayEl =
document.createElement('div');

dayEl.className = 'day';

const key =
`${year}-${month+1}-${day}`;

const dayEvents =
events.filter(e=>e.date===key);

dayEl.innerHTML = `

<div class="day-number">
${day}
</div>

<div class="events">

${dayEvents.map(event=>`

<div
class="event"
style="
background:${event.color};
"
>
${event.text}
</div>

`).join('')}

</div>

`;

dayEl.onclick = ()=>{

selectedDate = key;

overlay.style.display = 'flex';

document.getElementById('archiveInput').value =
archiveId;

};

daysEl.appendChild(dayEl);

}

}

//////////////////////////////////////////////////
// save
//////////////////////////////////////////////////

async function saveEvent(){

const text =
document
.getElementById('eventText')
.value
.trim();

if(!text){

alert('일정을 입력해줘!');
return;

}

await db
.collection("calendars")
.doc(
document.getElementById('archiveInput').value
|| 'default'
)
.collection("events")
.add({

text,
color:selectedColor,
date:selectedDate,
createdAt:Date.now()

});

overlay.style.display = 'none';

document.getElementById('eventText').value = '';

}

//////////////////////////////////////////////////
// close
//////////////////////////////////////////////////

overlay.addEventListener('click',(e)=>{

if(e.target === overlay){

overlay.style.display = 'none';

}

});

//////////////////////////////////////////////////
// month
//////////////////////////////////////////////////

function changeMonth(num){

currentDate.setMonth(
currentDate.getMonth()+num
);

renderCalendar();

}

//////////////////////////////////////////////////
// start
//////////////////////////////////////////////////

renderCalendar();

</script>

</body>
</html>
