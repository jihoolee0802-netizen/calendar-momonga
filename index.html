<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Momonga Calendar</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--sky:#DFF4FF;
--sky-deep:#BFE8FF;
--sky-light:#F3FBFF;
--mint:#E8FFF8;

--text:#4D5B68;
--white:#FFFFFF;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#F7FBFF;
font-family:'Pretendard',sans-serif;
padding:20px 14px 120px;
color:var(--text);
}

.container{
width:100%;
max-width:920px;
margin:auto;
}

.header-card{

background:linear-gradient(
135deg,
#F3FBFF,
#DFF4FF,
#BFE8FF
);

border-radius:34px;
padding:28px 24px;
margin-bottom:22px;

box-shadow:
0 12px 32px rgba(140,190,230,0.12);

border:1px solid rgba(255,255,255,0.6);

}

.momonga-wrap{
display:flex;
align-items:center;
gap:18px;
}

.momonga-img{

width:86px;
height:86px;

object-fit:cover;

border-radius:26px;

background:white;

padding:6px;

box-shadow:
0 6px 18px rgba(0,0,0,0.06);

flex-shrink:0;

}

.title{
font-size:36px;
font-weight:700;
line-height:1.1;
letter-spacing:-0.05em;
color:#52616F;
}

.sub{
margin-top:10px;
font-size:14px;
color:#6F7E8B;
}

.calendar{

background:white;

border-radius:32px;

padding:24px;

box-shadow:
0 10px 30px rgba(0,0,0,0.05);

border:1px solid #EEF5FB;

}

.month-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.month-title{
font-size:30px;
font-weight:700;
letter-spacing:-0.04em;
color:#5B6A78;
}

.month-btn{

border:none;

width:44px;
height:44px;

border-radius:50%;

background:#F2F8FD;

font-size:20px;

cursor:pointer;

color:#6F8292;

transition:0.18s ease;

}

.month-btn:hover{
transform:translateY(-2px);
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-bottom:14px;
}

.weekday{
text-align:center;
font-size:13px;
font-weight:700;
color:#98A7B5;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{

background:#FAFDFF;

border-radius:24px;

min-height:125px;

padding:10px;

position:relative;

transition:0.18s ease;

cursor:pointer;

border:1px solid #EEF5FB;

overflow:hidden;

}

.day:hover{
transform:translateY(-2px);
}

.day-number{
font-size:14px;
font-weight:700;
margin-bottom:8px;
color:#61707D;
}

.events{
display:flex;
flex-direction:column;
gap:7px;
}

.event{

padding:8px 14px;

border-radius:15px;

font-size:13px;
font-weight:700;

line-height:1.45;

width:100%;

overflow:hidden;

word-break:break-word;

box-shadow:
0 4px 10px rgba(0,0,0,0.04);

color:#5B6874;

}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{

width:100%;
max-width:700px;

background:white;

border-radius:32px 32px 0 0;

padding:24px 20px 40px;

max-height:92vh;
overflow:auto;

}

.editor-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#5B6A78;
}

.input{

width:100%;

border:none;
outline:none;

background:#F4F9FD;

border-radius:18px;

padding:16px;

margin-bottom:14px;

font-size:15px;

font-family:'Pretendard',sans-serif;

color:#4D5B68;

}

.color-grid{
display:flex;
gap:10px;
margin-bottom:22px;
flex-wrap:wrap;
}

.color-btn{

width:42px;
height:42px;

border-radius:50%;

border:3px solid transparent;

cursor:pointer;

transition:0.15s ease;

}

.color-btn.active{
border-color:#5B6A78;
transform:scale(1.05);
}

.submit{

width:100%;
height:56px;

border:none;

border-radius:20px;

background:linear-gradient(
135deg,
#DFF4FF,
#BFE8FF
);

font-size:16px;
font-weight:700;

cursor:pointer;

color:#4D5B68;

}

.footer{
margin-top:28px;
text-align:center;
font-size:13px;
color:#A3B0BC;
}

@media (max-width:768px){

.header-card{
padding:24px 20px;
}

.momonga-img{
width:72px;
height:72px;
border-radius:22px;
}

.title{
font-size:30px;
}

.month-title{
font-size:25px;
}

.day{
min-height:102px;
padding:8px;
}

.event{
font-size:12px;
padding:7px 12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header-card">

<div class="momonga-wrap">

<img
class="momonga-img"
src="https://cdn.phototourl.com/free/2026-05-26-ab31fe0c-9b66-46d0-b68c-a12e4aff9a9c.jpg"
/>

<div>

<div class="title">
MAY 2026 ✦
</div>

<div class="sub">
momonga schedule archive ☁️
</div>

</div>

</div>

</div>

<div class="calendar">

<div class="month-row">

<button
class="month-btn"
onclick="changeMonth(-1)"
>
‹
</button>

<div
class="month-title"
id="monthTitle"
>
May 2026
</div>

<button
class="month-btn"
onclick="changeMonth(1)"
>
›
</button>

</div>

<div class="weekdays">

<div class="weekday">SUN</div>
<div class="weekday">MON</div>
<div class="weekday">TUE</div>
<div class="weekday">WED</div>
<div class="weekday">THU</div>
<div class="weekday">FRI</div>
<div class="weekday">SAT</div>

</div>

<div
class="days"
id="days"
></div>

</div>

<div class="footer">
made with momonga ♡
</div>

</div>

<div
class="overlay"
id="overlay"
>

<div class="editor">

<div class="editor-title">
일정 추가 ✦
</div>

<input
class="input"
id="eventText"
placeholder="일정 입력 (10글자 정도 추천)"
maxlength="14"
/>

<input
class="input"
id="archiveInput"
placeholder="저장공간 이름"
/>

<div class="color-grid">

<div
class="color-btn active"
style="background:#DFF4FF"
data-color="#DFF4FF"
></div>

<div
class="color-btn"
style="background:#BFE8FF"
data-color="#BFE8FF"
></div>

<div
class="color-btn"
style="background:#F3FBFF"
data-color="#F3FBFF"
></div>

<div
class="color-btn"
style="background:#E8FFF8"
data-color="#E8FFF8"
></div>

<div
class="color-btn"
style="background:#FFFFFF;border:1px solid #DDE6EE"
data-color="#FFFFFF"
></div>

</div>

<button
class="submit"
onclick="saveEvent()"
>
저장하기
</button>

</div>

</div>

<script>

//////////////////////////////////////////////////
// firebase
//////////////////////////////////////////////////

const firebaseConfig = {

apiKey: "AIzaSyCzB2yaMHzz5Y9HrcGKKgVYGcNwh24pb_Y",

authDomain: "calendar-momonga.firebaseapp.com",

projectId: "calendar-momonga",

storageBucket: "calendar-momonga.firebasestorage.app",

messagingSenderId: "1048927787856",

appId: "1:1048927787856:web:5a75506e8ef885e618aa55"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

//////////////////////////////////////////////////
// archive
//////////////////////////////////////////////////

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

//////////////////////////////////////////////////
// state
//////////////////////////////////////////////////

const overlay =
document.getElementById('overlay');

const daysEl =
document.getElementById('days');

const monthTitle =
document.getElementById('monthTitle');

let currentDate =
new Date();

let selectedDate = null;

let selectedColor =
'#DFF4FF';

let events = [];

//////////////////////////////////////////////////
// color select
//////////////////////////////////////////////////

document
.querySelectorAll('.color-btn')
.forEach(btn=>{

btn.onclick = ()=>{

document
.querySelectorAll('.color-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

selectedColor =
btn.dataset.color;

};

});

//////////////////////////////////////////////////
// firestore realtime
//////////////////////////////////////////////////

db.collection("calendars")
.doc(archiveId)
.collection("events")
.onSnapshot(snapshot=>{

events =
snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderCalendar();

});

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////

function renderCalendar(){

daysEl.innerHTML = '';

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

const monthNames = [

'January',
'February',
'March',
'April',
'May',
'June',
'July',
'August',
'September',
'October',
'November',
'December'

];

monthTitle.textContent =
`${monthNames[month]} ${year}`;

for(let i=0;i<firstDay;i++){

const empty =
document.createElement('div');

daysEl.appendChild(empty);

}

for(let day=1;day<=lastDate;day++){

const dayEl =
document.createElement('div');

dayEl.className = 'day';

const key =
`${year}-${month+1}-${day}`;

const dayEvents =
events.filter(e=>e.date===key);

dayEl.innerHTML = `

<div class="day-number">
${day}
</div>

<div class="events">

${dayEvents.map(event=>`

<div
class="event"
style="
background:${event.color};
"
>
${event.text}
</div>

`).join('')}

</div>

`;

dayEl.onclick = ()=>{

selectedDate = key;

overlay.style.display = 'flex';

document.getElementById('archiveInput').value =
archiveId;

};

daysEl.appendChild(dayEl);

}

}

//////////////////////////////////////////////////
// save
//////////////////////////////////////////////////

async function saveEvent(){

const text =
document
.getElementById('eventText')
.value
.trim();

if(!text){

alert('일정을 입력해줘!');
return;

}

await db
.collection("calendars")
.doc(
document.getElementById('archiveInput').value
|| 'default'
)
.collection("events")
.add({

text,
color:selectedColor,
date:selectedDate,
createdAt:Date.now()

});

overlay.style.display = 'none';

document.getElementById('eventText').value = '';

}

//////////////////////////////////////////////////
// close
//////////////////////////////////////////////////

overlay.addEventListener('click',(e)=>{

if(e.target === overlay){

overlay.style.display = 'none';

}

});

//////////////////////////////////////////////////
// month
//////////////////////////////////////////////////

function changeMonth(num){

currentDate.setMonth(
currentDate.getMonth()+num
);

renderCalendar();

}

//////////////////////////////////////////////////
// start
//////////////////////////////////////////////////

renderCalendar();

</script>

</body>
</html>
