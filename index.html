<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MOMONGA CALENDAR</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--pink:#FFDDEE;
--purple:#E9D9FF;
--sky:#DFF4FF;
--sky-deep:#BFE8FF;
--yellow:#FFF0B8;
--white:#FFFFFF;
--text:#5B5B66;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#F8FBFF;
font-family:'Pretendard',sans-serif;
padding:18px 14px 120px;
color:var(--text);
}

.container{
width:100%;
max-width:850px;
margin:auto;
}

.header-card{
background:linear-gradient(
135deg,
#FFDDEE,
#E9D9FF,
#DFF4FF
);

border-radius:34px;
padding:28px;
margin-bottom:20px;

box-shadow:
0 10px 30px rgba(191,232,255,0.35);

border:1px solid rgba(255,255,255,0.8);

position:relative;
overflow:hidden;
}

.header-card::after{
content:'☁️';
position:absolute;
right:20px;
top:16px;
font-size:34px;
opacity:0.55;
}

.month{
font-size:14px;
font-weight:700;
letter-spacing:0.18em;
color:#7C8AA5;
margin-bottom:8px;
}

.title{
font-size:34px;
font-weight:700;
line-height:1.15;
color:white;
text-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.calendar{
background:white;
border-radius:34px;
padding:22px;

box-shadow:
0 10px 30px rgba(180,210,240,0.12);

border:1px solid #EEF5FC;
}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:14px;
gap:8px;
}

.week div{
text-align:center;
font-size:12px;
font-weight:700;
color:#9AA9BC;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:#FBFDFF;
border-radius:24px;
min-height:118px;
padding:10px;

border:1px solid #EEF5FC;

display:flex;
flex-direction:column;
gap:8px;

transition:0.18s ease;
position:relative;
overflow:hidden;
}

.day:hover{
transform:translateY(-2px);
}

.day-number{
font-size:14px;
font-weight:700;
color:#7D8CA3;
}

.event{
padding:8px 14px;
border-radius:999px;

font-size:12px;
font-weight:700;

display:flex;
align-items:center;
justify-content:center;

line-height:1.3;

word-break:keep-all;
text-align:center;

box-shadow:
0 4px 10px rgba(0,0,0,0.04);
}

.event-text{
max-width:110px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.add-button{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);

width:calc(100% - 28px);
max-width:850px;

height:58px;

border:none;
border-radius:24px;

background:linear-gradient(
135deg,
#BFE8FF,
#E9D9FF
);

color:white;

font-size:17px;
font-weight:700;

cursor:pointer;

box-shadow:
0 12px 30px rgba(191,232,255,0.35);

z-index:999;
}

.overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,0.35);

display:none;
justify-content:center;
align-items:flex-end;

z-index:1000;
}

.editor{
width:100%;
max-width:850px;

background:white;

border-radius:34px 34px 0 0;

padding:24px 18px 40px;

max-height:92vh;
overflow:auto;
}

.editor-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#7D8CA3;
}

.input{
width:100%;

border:none;
outline:none;

background:#F6FAFF;

border-radius:20px;

padding:16px;
margin-bottom:14px;

font-size:15px;
font-family:'Pretendard',sans-serif;

color:#555;
}

.submit{
width:100%;
height:56px;

border:none;
border-radius:20px;

background:linear-gradient(
135deg,
#BFE8FF,
#E9D9FF
);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;
}

.empty{
font-size:11px;
color:#D3DCE8;
text-align:center;
margin-top:auto;
margin-bottom:auto;
}

@media (max-width:700px){

.title{
font-size:28px;
}

.day{
min-height:100px;
padding:8px;
border-radius:20px;
}

.event{
font-size:11px;
padding:7px 10px;
}

.event-text{
max-width:82px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header-card">

<div class="month">
MAY 2026 ✦
</div>

<div class="title">
Momonga Calendar
</div>

</div>

<div class="calendar">

<div class="week">
<div>SUN</div>
<div>MON</div>
<div>TUE</div>
<div>WED</div>
<div>THU</div>
<div>FRI</div>
<div>SAT</div>
</div>

<div class="days" id="days"></div>

</div>

</div>

<button
class="add-button"
onclick="openEditor()"
>
+ 일정 추가
</button>

<div class="overlay" id="overlay">

<div class="editor">

<div class="editor-title">
일정 추가 ✦
</div>

<input
class="input"
id="dateInput"
type="number"
placeholder="날짜 입력 (1~31)"
>

<input
class="input"
id="textInput"
placeholder="일정 입력"
>

<input
class="input"
id="archiveInput"
placeholder="저장공간 이름"
>

<button
class="submit"
onclick="addEvent()"
>
저장하기
</button>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCzB2yaMHzz5Y9HrcGKKgVYGcNwh24pb_Y",
authDomain: "calendar-momonga.firebaseapp.com",
projectId: "calendar-momonga",
storageBucket: "calendar-momonga.firebasestorage.app",
messagingSenderId: "1048927787856",
appId: "1:1048927787856:web:5a75506e8ef885e618aa55"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

const daysEl =
document.getElementById('days');

const overlay =
document.getElementById('overlay');

let schedules = [];

const colors = [
'#FFDDEE',
'#E9D9FF',
'#FFE8C7',
'#DFF4FF',
'#FFFFFF'
];

function openEditor(){

overlay.style.display = 'flex';

document.getElementById('archiveInput').value =
archiveId;

}

overlay.addEventListener('click',(e)=>{

if(e.target === overlay){

overlay.style.display = 'none';

}

});

db.collection("calendars")
.doc(archiveId)
.collection("events")
.orderBy("createdAt","asc")
.onSnapshot(snapshot=>{

schedules = snapshot.docs.map(doc=>({

id:doc.id,
...doc.data()

}));

renderCalendar();

});

function renderCalendar(){

daysEl.innerHTML = '';

const firstDay = 5;
const totalDays = 31;

for(let i=0;i<firstDay;i++){

const empty =
document.createElement('div');

daysEl.appendChild(empty);

}

for(let day=1; day<=totalDays; day++){

const box =
document.createElement('div');

box.className = 'day';

const events =
schedules.filter(
item => Number(item.date) === day
);

let eventsHTML = '';

events.forEach((event,index)=>{

eventsHTML += `

<div
class="event"
style="
background:${colors[index % colors.length]};
"
>

<div class="event-text">
${event.text}
</div>

</div>

`;

});

box.innerHTML = `

<div class="day-number">
${day}
</div>

${eventsHTML || `
<div class="empty">
✦
</div>
`}

`;

daysEl.appendChild(box);

}

}

async function addEvent(){

const date =
document.getElementById('dateInput').value;

const text =
document.getElementById('textInput').value;

const archive =
document.getElementById('archiveInput').value
|| 'default';

if(!date || !text){

alert('날짜랑 일정을 입력해줘!');

return;

}

await db
.collection("calendars")
.doc(archive)
.collection("events")
.add({

date,
text,

createdAt:Date.now()

});

overlay.style.display = 'none';

document.getElementById('dateInput').value = '';
document.getElementById('textInput').value = '';

}

</script>

</body>
</html>
