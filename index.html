<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Momonga Calendar</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#F7FAFD;
font-family:'Pretendard',sans-serif;
padding:24px 14px 120px;
color:#111;
}

.container{
width:100%;
max-width:900px;
margin:auto;
}

.header-card{
background:white;
border-radius:32px;
padding:28px 26px;
margin-bottom:20px;
border:1px solid #EDF3F8;
box-shadow:0 10px 30px rgba(158,196,232,0.12);
}

.month-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.month-title{
font-size:38px;
font-weight:700;
letter-spacing:-0.05em;
background:linear-gradient(135deg,#8DB8E2,#C7DDF5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.month-buttons{
display:flex;
gap:8px;
}

.month-btn{
width:42px;
height:42px;
border:none;
border-radius:16px;
background:#EEF5FC;
color:#6B9BCB;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.18s ease;
}

.month-btn:active{
transform:scale(0.94);
}

.calendar-card{
background:white;
border-radius:32px;
padding:24px;
border:1px solid #EDF3F8;
box-shadow:0 10px 30px rgba(158,196,232,0.10);
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:14px;
}

.weekday{
text-align:center;
font-size:13px;
font-weight:700;
color:#A2B7CB;
padding:10px 0;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
}

.day{
aspect-ratio:1/1;
background:#FBFDFF;
border:1px solid #EEF4FA;
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
gap:6px;
cursor:pointer;
transition:0.18s ease;
position:relative;
overflow:hidden;
}

.day:hover{
transform:translateY(-2px);
box-shadow:0 10px 24px rgba(158,196,232,0.14);
}

.day.other-month{
opacity:0.35;
}

.day.today{
background:#EAF4FF;
border:1px solid #CFE4F8;
}

.day-number{
font-size:15px;
font-weight:700;
color:#6B87A3;
}

.today .day-number{
color:#5F8FBF;
}

.stickers{
display:flex;
flex-direction:column;
gap:5px;
overflow:hidden;
}

.sticker{
padding:6px 10px;
border-radius:999px;
font-size:11px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.editor-card{
margin-top:18px;
background:white;
border-radius:30px;
padding:24px;
border:1px solid #EDF3F8;
box-shadow:0 10px 30px rgba(158,196,232,0.10);
display:none;
animation:fadeUp 0.25s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.editor-title{
font-size:24px;
font-weight:700;
margin-bottom:18px;
color:#6B87A3;
}

.input{
width:100%;
border:none;
outline:none;
background:#F5F8FC;
border-radius:18px;
padding:16px;
font-size:15px;
font-family:'Pretendard',sans-serif;
margin-bottom:12px;
}

.color-row{
display:flex;
gap:10px;
margin-bottom:18px;
flex-wrap:wrap;
}

.color-btn{
width:34px;
height:34px;
border-radius:50%;
border:none;
cursor:pointer;
transition:0.15s ease;
}

.color-btn.active{
outline:3px solid #D7E8F8;
outline-offset:3px;
}

.submit-btn{
width:100%;
height:54px;
border:none;
border-radius:18px;
background:#9EC4E8;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 24px rgba(158,196,232,0.28);
}

.empty-text{
font-size:14px;
color:#AABCCC;
margin-top:4px;
}

@media (max-width:768px){

.month-title{
font-size:30px;
}

.calendar{
gap:8px;
}

.day{
border-radius:20px;
padding:10px;
}

.sticker{
font-size:10px;
padding:5px 8px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header-card">

<div class="month-row">

<div class="month-title" id="monthTitle">
MAY 2026 ✦
</div>

<div class="month-buttons">

<button
class="month-btn"
onclick="changeMonth(-1)"
>
‹
</button>

<button
class="month-btn"
onclick="changeMonth(1)"
>
›
</button>

</div>

</div>

</div>

<div class="calendar-card">

<div class="weekdays">

<div class="weekday">SUN</div>
<div class="weekday">MON</div>
<div class="weekday">TUE</div>
<div class="weekday">WED</div>
<div class="weekday">THU</div>
<div class="weekday">FRI</div>
<div class="weekday">SAT</div>

</div>

<div class="calendar" id="calendar"></div>

</div>

<div class="editor-card" id="editorCard">

<div class="editor-title" id="editorTitle">
2026. 05. 27 ✦
</div>

<input
class="input"
id="scheduleInput"
placeholder="일정을 입력해줘..."
maxlength="28"
/>

<div class="color-row">

<button class="color-btn active" style="background:#9EC4E8;" data-color="#9EC4E8"></button>
<button class="color-btn" style="background:#FFB7D5;" data-color="#FFB7D5"></button>
<button class="color-btn" style="background:#C7B6FF;" data-color="#C7B6FF"></button>
<button class="color-btn" style="background:#FFE08A;" data-color="#FFE08A"></button>
<button class="color-btn" style="background:#BEE7C5;" data-color="#BEE7C5"></button>

</div>

<button
class="submit-btn"
onclick="saveSchedule()"
>
저장하기
</button>

<div class="empty-text">
짧은 일정만 기록할 수 있어 ✦
</div>

</div>

</div>

<script>

//////////////////////////////////////////////////
// firebase
//////////////////////////////////////////////////

const firebaseConfig = {
apiKey: "AIzaSyCzB2yaMHzz5Y9HrcGKKgVYGcNwh24pb_Y",
authDomain: "calendar-momonga.firebaseapp.com",
projectId: "calendar-momonga",
storageBucket: "calendar-momonga.firebasestorage.app",
messagingSenderId: "1048927787856",
appId: "1:1048927787856:web:5a75506e8ef885e618aa55"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

//////////////////////////////////////////////////
// archive
//////////////////////////////////////////////////

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

//////////////////////////////////////////////////
// state
//////////////////////////////////////////////////

const calendar =
document.getElementById('calendar');

const monthTitle =
document.getElementById('monthTitle');

const editorCard =
document.getElementById('editorCard');

const editorTitle =
document.getElementById('editorTitle');

let currentDate =
new Date();

let selectedDate = null;

let selectedColor = '#9EC4E8';

let schedules = [];

//////////////////////////////////////////////////
// firestore realtime
//////////////////////////////////////////////////

db.collection("calendarArchives")
.doc(archiveId)
.collection("schedules")
.onSnapshot(snapshot=>{

schedules =
snapshot.docs.map(doc=>({
id:doc.id,
...doc.data()
}));

renderCalendar();

});

//////////////////////////////////////////////////
// month title
//////////////////////////////////////////////////

const monthNames = [
'JANUARY',
'FEBRUARY',
'MARCH',
'APRIL',
'MAY',
'JUNE',
'JULY',
'AUGUST',
'SEPTEMBER',
'OCTOBER',
'NOVEMBER',
'DECEMBER'
];

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////

function renderCalendar(){

calendar.innerHTML = '';

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

monthTitle.textContent =
`${monthNames[month]} ${year} ✦`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month + 1,0).getDate();

const prevLastDate =
new Date(year,month,0).getDate();

const today =
new Date();

//////////////////////////////////////////////////
// prev dates
//////////////////////////////////////////////////

for(let i=firstDay-1;i>=0;i--){

createDay({
number:prevLastDate - i,
other:true
});

}

//////////////////////////////////////////////////
// current dates
//////////////////////////////////////////////////

for(let date=1; date<=lastDate; date++){

const fullDate =
formatDate(year,month,date);

const isToday =
today.getFullYear() === year &&
today.getMonth() === month &&
today.getDate() === date;

const daySchedules =
schedules.filter(
item => item.date === fullDate
);

createDay({
number:date,
today:isToday,
fullDate,
schedules:daySchedules
});

}

}

//////////////////////////////////////////////////
// create day
//////////////////////////////////////////////////

function createDay(data){

const day =
document.createElement('div');

day.className = 'day';

if(data.other){
day.classList.add('other-month');
}

if(data.today){
day.classList.add('today');
}

let stickersHTML = '';

(data.schedules || []).slice(0,2).forEach(item=>{

stickersHTML += `
<div
class="sticker"
style="
background:${item.color}25;
color:${item.color};
"
>
${item.text}
</div>
`;

});

day.innerHTML = `

<div class="day-number">
${data.number}
</div>

<div class="stickers">
${stickersHTML}
</div>

`;

if(data.fullDate){

day.onclick = ()=>{

selectedDate =
data.fullDate;

editorCard.style.display = 'block';

editorTitle.textContent =
selectedDate.replaceAll('-','. ') + ' ✦';

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

};

}

calendar.appendChild(day);

}

//////////////////////////////////////////////////
// save
//////////////////////////////////////////////////

async function saveSchedule(){

if(!selectedDate) return;

const text =
document.getElementById('scheduleInput')
.value
.trim();

if(!text){

alert('일정을 입력해줘!');
return;

}

await db
.collection("calendarArchives")
.doc(archiveId)
.collection("schedules")
.add({

date:selectedDate,
text,
color:selectedColor,
createdAt:Date.now()

});

document.getElementById('scheduleInput')
.value = '';

}

//////////////////////////////////////////////////
// month move
//////////////////////////////////////////////////

function changeMonth(value){

currentDate.setMonth(
currentDate.getMonth() + value
);

renderCalendar();

}

//////////////////////////////////////////////////
// format
//////////////////////////////////////////////////

function formatDate(year,month,date){

const mm =
String(month + 1).padStart(2,'0');

const dd =
String(date).padStart(2,'0');

return `${year}-${mm}-${dd}`;

}

//////////////////////////////////////////////////
// color select
//////////////////////////////////////////////////

document
.querySelectorAll('.color-btn')
.forEach(btn=>{

btn.addEventListener('click',()=>{

document
.querySelectorAll('.color-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

selectedColor =
btn.dataset.color;

});

});

//////////////////////////////////////////////////
// start
//////////////////////////////////////////////////

renderCalendar();

</script>

</body>
</html>
